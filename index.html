<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DessertMash</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>DessertMash</h1>
<p class="subtitle">Comparación A/B para descubrir los mejores postres</p>

<div class="container">

<!-- CONFIGURA -->
<div class="card">

<h2>1) Configura</h2>

<label>Perfil (público)</label>
<select id="perfil">
<option>Niños</option>
<option>Adolescentes</option>
<option>Adultos</option>
<option>Amantes del chocolate</option>
</select>

<label>Contexto (pregunta)</label>
<select id="contexto">
<option>¿Cuál postre es más delicioso?</option>
<option>¿Cuál postre pedirías después de cenar?</option>
<option>¿Cuál postre recomendarías a un amigo?</option>
</select>

<button onclick="nuevoDuelo()">Nuevo duelo</button>
<button onclick="reiniciar()">Reiniciar</button>

</div>

<!-- VOTA -->
<div class="card">

<h2>2) Vota</h2>

<p id="pregunta"></p>

<div class="duelo">

<button class="postre" onclick="votar('A')">
<span>A</span>
<p id="postreA"></p>
</button>

<button class="postre" onclick="votar('B')">
<span>B</span>
<p id="postreB"></p>
</button>

</div>

</div>

<!-- RANKING -->
<div class="card">

<h2>3) Ranking (Top 10)</h2>

<ol id="ranking"></ol>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
